<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Hub - Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="navbar">
      <h1 class="logo">Sports Hub</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="game.html">Game</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>


  <div class="page-top">
    <h2>Contact Us</h2>
    <p>Have feedback or questions? Fill the form below.</p>
  </div>

 
  <div class="form-wrapper">

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Enter your full name" />
      <span class="error-msg" id="name-error">Name cannot be empty</span>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="text" id="email" placeholder="Enter your email" />
      <span class="error-msg" id="email-error">Email must contain @</span>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Write your message here"></textarea>
      <span class="error-msg" id="message-error">Message cannot be empty</span>
    </div>

    <button class="btn btn-full" onclick="validateForm()">Submit</button>

    <div id="form-result" class="form-result"></div>

  </div>


  <footer>
    <p>© 2025 Sports Hub. All Rights Reserved.</p>
    <div class="footer-links">
      <a href="https://www.facebook.com" target="_blank">Facebook</a>
      <a href="https://www.instagram.com" target="_blank">Instagram</a>
      <a href="https://www.twitter.com" target="_blank">Twitter</a>
    </div>
  </footer>

  <script src="js/contact.js"></script>
</body>
</html>
